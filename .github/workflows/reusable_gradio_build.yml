name: "Build Gradio component"

on:
  workflow_call:
    inputs:
      CONCURRENCY:
        required: true
        type: string

concurrency:
  group: ${{ inputs.CONCURRENCY }}-gradio_build
  cancel-in-progress: true

defaults:
  run:
    shell: bash --noprofile --norc -euo pipefail {0}

permissions:
  contents: "read"
  id-token: "write"

jobs:
  gradio-build:
    name: Build component
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || '' }}

      - name: "Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - uses: astral-sh/setup-uv@v6

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: "./frontend/package.json"
          run_install: false

      - name: "Set up Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
          cache-dependency-path: "./frontend/pnpm-lock.yaml"

      - name: "Install Python dependencies"
        run: uv sync --dev

      - name: "Install frontend dependencies"
        working-directory: "./frontend"
        run: pnpm install --frozen-lockfile

      - name: "Build gradio component"
        run: uv run gradio cc build

      - name: Fail if generated files changed
        run: |
          # Show what changed (if anything) for easier debugging
          git status --porcelain
          # Fail if there are any modified, deleted, or untracked files
          if ! git diff --quiet || ! git diff --cached --quiet || [ -n "$(git ls-files --others --exclude-standard)" ]; then
              # Print a short diff for context
              git --no-pager diff | sed -n '1,200p'
              echo "::error::Generated files are out of date. Run 'uv run gradio cc build' locally and commit the results."
              exit 1
          fi
